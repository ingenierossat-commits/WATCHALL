<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WATCHALL</title>
  <meta name="theme-color" content="#1A1A1A" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --black:   #1A1A1A;
      --beige:   #F5F0E8;
      --beige-md:#C9B99A;
      --beige-dk:#2A2520;
      --white:   #FFFFFF;
      --red:     #E63946;
      --green:   #2DC653;
      --card:    #222018;
      --border:  #3A3530;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--beige); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; background: var(--black); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .eye-svg { width: 36px; height: 36px; flex-shrink: 0; }
    .eye-svg .pupil-anim { animation: pupilPulse 2s ease-in-out infinite; }
    @keyframes pupilPulse { 0%,100%{r:5} 50%{r:7} }
    .brand { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.12em; color: var(--beige); }
    .brand span { color: var(--beige-md); font-weight: 400; }
    .header-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .conn-badge { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 2px; background: var(--beige-dk); color: var(--beige-md); border: 1px solid var(--border); }
    .conn-badge.online { background: rgba(45,198,83,0.12); color: var(--green); border-color: rgba(45,198,83,0.3); }
    .proj-badge { font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: var(--beige-md); letter-spacing: 0.06em; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    .proj-badge.active { color: var(--beige); }

    /* NAV */
    nav { display: flex; background: var(--black); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    .tab { flex: 1; min-width: 60px; padding: 10px 4px 8px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--beige-md); font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: color 0.2s, border-color 0.2s; text-align: center; }
    .tab.active { color: var(--beige); border-bottom-color: var(--beige-md); }
    .tab-icon { display: block; font-size: 16px; margin-bottom: 2px; }

    /* MAIN */
    main { flex: 1; padding: 16px; max-width: 600px; width: 100%; margin: 0 auto; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* COMUNES */
    .section-label { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--beige-md); text-transform: uppercase; margin-bottom: 10px; margin-top: 18px; }
    .section-label:first-child { margin-top: 0; }
    .update-bar { text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: var(--beige-md); letter-spacing: 0.08em; padding: 8px 0 4px; opacity: 0.7; }
    .empty-state { text-align: center; color: var(--beige-md); font-family: 'Space Grotesk', sans-serif; font-size: 13px; padding: 40px 20px; line-height: 1.8; }
    .empty-state strong { color: var(--beige); display: block; margin-bottom: 8px; font-size: 15px; }

    /* ENTRY ROW */
    .entry-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; }
    .entry-row.high { border-left: 3px solid var(--green); }
    .entry-row.low  { border-left: 3px solid var(--red); }
    .entry-row.unknown { border-left: 3px solid var(--border); }
    .entry-num { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; color: var(--beige-md); letter-spacing: 0.08em; min-width: 32px; }
    .entry-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 500; color: var(--beige); flex: 1; }
    .entry-time { font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: var(--beige-md); text-align: right; min-width: 60px; }
    .state-badge { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; padding: 4px 10px; border-radius: 2px; min-width: 52px; text-align: center; }
    .state-badge.high { background: rgba(45,198,83,0.15); color: var(--green); border: 1px solid rgba(45,198,83,0.3); }
    .state-badge.low  { background: rgba(230,57,70,0.15);  color: var(--red);   border: 1px solid rgba(230,57,70,0.3); }
    .state-badge.unknown { background: var(--beige-dk); color: var(--beige-md); border: 1px solid var(--border); }

    /* TOGGLE */
    .toggle-wrap { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider::after { content: ''; position: absolute; width: 16px; height: 16px; background: var(--beige-md); border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s, background 0.2s; }
    .toggle-wrap input:checked + .toggle-slider { background: rgba(45,198,83,0.3); }
    .toggle-wrap input:checked + .toggle-slider::after { transform: translateX(18px); background: var(--green); }

    /* BUTTONS */
    .btn-icon { background: none; border: 1px solid var(--border); color: var(--beige-md); width: 30px; height: 30px; border-radius: 3px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, color 0.2s; flex-shrink: 0; }
    .btn-icon:hover { border-color: var(--beige-md); color: var(--beige); }
    .btn-save { background: rgba(201,185,154,0.1); border: 1px solid var(--beige-md); color: var(--beige); font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; padding: 7px 16px; border-radius: 3px; cursor: pointer; transition: background 0.2s; }
    .btn-save:hover { background: rgba(201,185,154,0.2); }
    .btn-primary { width: 100%; background: var(--beige); border: none; color: var(--black); font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; padding: 12px; border-radius: 3px; cursor: pointer; text-transform: uppercase; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger { background: rgba(230,57,70,0.1); border: 1px solid rgba(230,57,70,0.3); color: var(--red); font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 3px; cursor: pointer; }

    /* FORMS */
    select, input[type="number"], input[type="text"], input[type="date"] {
      background: var(--beige-dk); border: 1px solid var(--border); color: var(--beige);
      font-family: 'Space Grotesk', sans-serif; font-size: 12px; padding: 6px 8px;
      border-radius: 3px; width: 100%; outline: none; color-scheme: dark;
    }
    select:focus, input:focus { border-color: var(--beige-md); }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-label { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--beige-md); text-transform: uppercase; }
    .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }

    /* CONFIG ROWS */
    .config-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; }
    .config-num { font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: var(--beige-md); min-width: 32px; }
    .config-name { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500; color: var(--beige); flex: 1; }
    .debounce-wrap { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .debounce-wrap input { width: 48px; font-size: 11px; padding: 4px 5px; text-align: center; }
    .debounce-wrap span { font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: var(--beige-md); }

    /* SALIDAS CONFIG */
    .output-config { background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
    .output-config-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; }
    .output-extra { padding: 0 14px 12px; border-top: 1px solid var(--border); background: var(--beige-dk); display: none; }
    .output-extra.visible { display: block; }
    .output-extra-inner { padding-top: 12px; }

    /* ALARMAS */
    .alarm-row { padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; }
    .alarm-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .alarm-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; color: var(--beige); flex: 1; }
    .alarm-active-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .alarm-active-dot.on { background: var(--green); }
    .alarm-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .alarm-notif { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .alarm-notif label { font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: var(--beige-md); display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .alarm-notif input[type="checkbox"] { width: auto; accent-color: var(--green); }
    .msg-input-wrap { margin-top: 6px; display: none; }
    .msg-input-wrap.visible { display: block; }

    /* PROYECTOS */
    .proj-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 10px; }
    .proj-card.activo { border-color: var(--beige-md); }
    .proj-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .proj-card-name { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; color: var(--beige); flex: 1; }
    .proj-activo-tag { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 2px; background: rgba(45,198,83,0.15); color: var(--green); border: 1px solid rgba(45,198,83,0.3); }
    .proj-card-meta { font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: var(--beige-md); margin-bottom: 10px; }
    .proj-card-actions { display: flex; gap: 8px; }

    /* INFORMES */
    .report-proj-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
    .report-proj-card:hover { border-color: var(--beige-md); }
    .report-proj-card.selected { border-color: var(--beige-md); background: var(--beige-dk); }
    .report-proj-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; color: var(--beige); margin-bottom: 4px; }
    .report-proj-meta { font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: var(--beige-md); }
    .report-detail { display: none; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 12px; }
    .report-detail.visible { display: block; }
    .report-entry-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .report-entry-row:last-child { border-bottom: none; }
    .report-entry-name { font-family: 'Space Grotesk', sans-serif; font-size: 13px; color: var(--beige); flex: 1; }
    .report-checks-inline { display: flex; gap: 10px; align-items: center; }
    .report-check-label { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; color: var(--beige-md); display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .report-check-label input { width: auto; accent-color: var(--beige-md); }
    .report-check-label.low-lbl { color: var(--red); }
    .report-check-label.high-lbl { color: var(--green); }
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--beige-md); border-radius: 4px; padding: 20px; width: 100%; max-width: 340px; }
    .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; color: var(--beige); margin-bottom: 14px; letter-spacing: 0.06em; }
    .modal-body { display: flex; flex-direction: column; gap: 10px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-cancel { flex: 1; background: none; border: 1px solid var(--border); color: var(--beige-md); font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; padding: 9px; border-radius: 3px; cursor: pointer; }
    .btn-confirm { flex: 1; background: var(--beige); border: none; color: var(--black); font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; padding: 9px; border-radius: 3px; cursor: pointer; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--beige); color: var(--black); font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 3px; z-index: 300; transition: transform 0.3s; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <svg class="eye-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="18" cy="18" rx="16" ry="10" stroke="#C9B99A" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="6" fill="#1A1A1A" stroke="#C9B99A" stroke-width="1.2"/>
    <circle class="pupil-anim" cx="18" cy="18" r="5" fill="#F5F0E8"/>
    <circle cx="20" cy="16" r="1.5" fill="#1A1A1A"/>
  </svg>
  <div class="brand">WATCH<span>ALL</span></div>
  <div class="header-right">
    <div class="conn-badge" id="connBadge">OFFLINE</div>
    <div class="proj-badge" id="projBadge">Sin proyecto activo</div>
  </div>
</header>

<nav>
  <button class="tab active" onclick="switchTab('proyectos',this)"><span class="tab-icon">📁</span>PROYECTOS</button>
  <button class="tab" onclick="switchTab('estado',this)"><span class="tab-icon">⬛</span>ESTADO</button>
  <button class="tab" onclick="switchTab('config',this)"><span class="tab-icon">⚙️</span>CONFIG</button>
  <button class="tab" onclick="switchTab('alarmas',this)"><span class="tab-icon">🔔</span>ALARMAS</button>
  <button class="tab" onclick="switchTab('informes',this)"><span class="tab-icon">📄</span>INFORMES</button>
</nav>

<main>

  <!-- PROYECTOS -->
  <div class="screen active" id="screen-proyectos">
    <div id="proyectos-list"></div>
    <button class="btn-primary" style="margin-top:8px;" onclick="openModalNuevoProyecto()">+ NUEVO PROYECTO</button>
  </div>

  <!-- ESTADO -->
  <div class="screen" id="screen-estado">
    <div class="update-bar" id="updateBar">— sin conexión —</div>
    <div id="entradas-estado"></div>
    <div id="salidas-estado-wrap">
      <div class="section-label" id="salidas-label" style="display:none;">SALIDAS</div>
      <div id="salidas-estado"></div>
    </div>
  </div>

  <!-- CONFIG -->
  <div class="screen" id="screen-config">
    <div id="config-content"></div>
  </div>

  <!-- ALARMAS -->
  <div class="screen" id="screen-alarmas">
    <div id="alarmas-content"></div>
  </div>

  <!-- INFORMES -->
  <div class="screen" id="screen-informes">
    <div id="informes-content"></div>
  </div>

</main>

<!-- MODAL NUEVO PROYECTO -->
<div class="modal-overlay" id="modalNuevoProyecto">
  <div class="modal">
    <div class="modal-title">NUEVO PROYECTO</div>
    <div class="modal-body">
      <div class="field-group">
        <div class="field-label">NOMBRE DEL PROYECTO</div>
        <input type="text" id="modalProjNombre" maxlength="40" placeholder="Ej: Hotel Riviera" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalNuevoProyecto')">CANCELAR</button>
      <button class="btn-confirm" onclick="crearProyecto()">CREAR</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR NOMBRE -->
<div class="modal-overlay" id="modalEdit">
  <div class="modal">
    <div class="modal-title" id="modalEditTitle">EDITAR</div>
    <div class="modal-body">
      <div class="field-group">
        <div class="field-label">NOMBRE</div>
        <input type="text" id="modalNameInput" maxlength="24" placeholder="Nombre" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalEdit')">CANCELAR</button>
      <button class="btn-confirm" onclick="saveEditName()">GUARDAR</button>
    </div>
  </div>
</div>

<!-- MODAL ASOCIADA -->
<div class="modal-overlay" id="modalAsociada">
  <div class="modal">
    <div class="modal-title" id="modalAsociadaTitle">CONFIGURAR SALIDA ASOCIADA</div>
    <div class="modal-body">
      <div class="field-group">
        <div class="field-label">ENTRADA ASOCIADA</div>
        <select id="asocEntrada"></select>
      </div>
      <div class="field-group">
        <div class="field-label">CONDICIÓN DE DISPARO</div>
        <select id="asocCondicion">
          <option value="activacion">Activación (LOW→HIGH)</option>
          <option value="desactivacion">Desactivación (HIGH→LOW)</option>
        </select>
      </div>
      <div class="field-group">
        <div class="field-label">COMPORTAMIENTO DEL RELÉ</div>
        <select id="asocComportamiento" onchange="toggleAsocTiempo()">
          <option value="tiempo">Activación temporal</option>
          <option value="permanente">Permanente mientras entrada ON</option>
        </select>
      </div>
      <div class="field-group" id="asocTiempoWrap">
        <div class="field-label">TIEMPO ACTIVACIÓN (segundos)</div>
        <input type="number" id="asocTiempo" min="1" max="3600" value="5" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalAsociada')">CANCELAR</button>
      <button class="btn-confirm" onclick="saveAsociada()">GUARDAR</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════
const MAC  = "AABBCCDDEEFF";
const NUM_E = 6, NUM_S = 2;

function entradaDefecto(i) {
  return { id:i+1, nombre:'IN'+(i+1), activa:false, valor:null, ultimoCambio:null, debounce:20,
    alarma:{ habilitada:false, tipo:'subida', tiempoMin:0, notificar:false, mensaje:'Alerta IN'+(i+1) } };
}
function salidaDefecto(i) {
  return { id:i+1, nombre:'OUT'+(i+1), activa:false, valor:false, modo:'impulso',
    impulso:{ intervalo:5 }, asociada:{ entrada:null, condicion:'activacion', comportamiento:'tiempo', duracion:5 } };
}

// ═══════════════════════════════════════════
// ESTADO LOCAL
// ═══════════════════════════════════════════
let isOnline = false;
let proyectoActivoId = null;
let proyectos = {}; // { id: { nombre, creado, entradas[], salidas[], eventos{} } }
let estadoActual = { entradas: [], salidas: [] };

function loadLocal() {
  try {
    const p = localStorage.getItem('watchall_proyectos');
    if(p) proyectos = JSON.parse(p);
    proyectoActivoId = localStorage.getItem('watchall_activo') || null;
  } catch(e){}
}
function saveLocal() {
  try {
    localStorage.setItem('watchall_proyectos', JSON.stringify(proyectos));
    localStorage.setItem('watchall_activo', proyectoActivoId || '');
  } catch(e){}
}

loadLocal();

function proyectoActivo() {
  return proyectoActivoId && proyectos[proyectoActivoId] ? proyectos[proyectoActivoId] : null;
}

// ═══════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════
const BASE = "watchall/dispositivos/" + MAC;

firebase.initializeApp({ databaseURL: "https://listify-16b5d-default-rtdb.europe-west1.firebasedatabase.app" });
const db = firebase.database();

// Escuchar proyecto activo desde Firebase
db.ref(BASE + "/proyecto_activo").on("value", snap => {
  const id = snap.val();
  if(id && id !== proyectoActivoId) {
    proyectoActivoId = id;
    saveLocal();
    updateProjBadge();
  }
});

// Escuchar estado en tiempo real
db.ref(BASE + "/estado").on("value", snap => {
  const data = snap.val();
  if(!data) return;
  isOnline = true;
  const proj = proyectoActivo();
  if(proj) {
    if(data.entradas) Object.entries(data.entradas).forEach(([i,v]) => {
      const idx = parseInt(i);
      if(proj.entradas[idx]) { proj.entradas[idx].valor = v.valor; proj.entradas[idx].ultimoCambio = v.ultimoCambio; }
    });
    if(data.salidas) Object.entries(data.salidas).forEach(([i,v]) => {
      const idx = parseInt(i);
      if(proj.salidas[idx]) proj.salidas[idx].valor = v.valor;
    });
  }
  saveLocal(); renderEstado(); updateConnBadge();
}, () => { isOnline = false; updateConnBadge(); renderEstado(); });

// Escuchar eventos del proyecto activo
function suscribirEventos(projId) {
  if(!projId) return;
  db.ref("watchall/proyectos/" + projId + "/eventos").on("value", snap => {
    const data = snap.val();
    if(!proyectos[projId]) return;
    proyectos[projId].eventos = data || {};
    saveLocal();
  });
}

function fbWriteConfig() {
  const proj = proyectoActivo();
  if(!proj || !proyectoActivoId) return;
  db.ref("watchall/proyectos/" + proyectoActivoId + "/config").set({
    entradas: proj.entradas.map(e => ({ nombre:e.nombre, activa:e.activa, debounce:e.debounce, alarma:e.alarma })),
    salidas:  proj.salidas.map(s  => ({ nombre:s.nombre, activa:s.activa, modo:s.modo, impulso:s.impulso, asociada:s.asociada }))
  }).catch(e => console.warn("Firebase write error:", e));
}

function fbBorrarEventosEntrada(projId, entradaId) {
  const eventos = proyectos[projId] ? proyectos[projId].eventos : {};
  const updates = {};
  Object.entries(eventos).forEach(([k,v]) => {
    if(v.id === entradaId) updates["watchall/proyectos/" + projId + "/eventos/" + k] = null;
  });
  if(Object.keys(updates).length > 0) db.ref().update(updates);
}

function fbBorrarProyecto(projId) {
  db.ref("watchall/proyectos/" + projId).remove();
  if(proyectoActivoId === projId) {
    db.ref(BASE + "/proyecto_activo").remove();
    proyectoActivoId = null;
  }
  delete proyectos[projId];
  saveLocal();
}

function fbActivarProyecto(projId) {
  proyectoActivoId = projId;
  db.ref(BASE + "/proyecto_activo").set(projId);
  db.ref(BASE + "/config").set({
    entradas: proyectos[projId].entradas.map(e => ({ nombre:e.nombre, activa:e.activa, debounce:e.debounce, alarma:e.alarma })),
    salidas:  proyectos[projId].salidas.map(s  => ({ nombre:s.nombre, activa:s.activa, modo:s.modo, impulso:s.impulso, asociada:s.asociada }))
  });
  suscribirEventos(projId);
  saveLocal();
}

// PROYECTOS CRUD
// ═══════════════════════════════════════════
function crearProyecto() {
  const nombre = document.getElementById('modalProjNombre').value.trim();
  if(!nombre) { showToast('Escribe un nombre'); return; }
  const id = 'proj_' + Date.now();
  proyectos[id] = {
    nombre, creado: new Date().toISOString(),
    entradas: Array.from({length:NUM_E}, (_,i) => entradaDefecto(i)),
    salidas:  Array.from({length:NUM_S}, (_,i) => salidaDefecto(i)),
    eventos: {}
  };
  db.ref("watchall/proyectos/" + id + "/nombre").set(nombre);
  db.ref("watchall/proyectos/" + id + "/creado").set(proyectos[id].creado);
  saveLocal();
  closeModal('modalNuevoProyecto');
  showToast('Proyecto creado');
  renderProyectos();
}

function activarProyecto(id) {
  fbActivarProyecto(id);
  updateProjBadge();
  showToast('Proyecto activado: ' + proyectos[id].nombre);
  renderProyectos();
  renderEstado();
}

function borrarProyecto(id) {
  const nombre = proyectos[id] ? proyectos[id].nombre : id;
  if(!confirm('¿Borrar proyecto "' + nombre + '"?\nSe eliminarán todos los datos asociados en Firebase.')) return;
  fbBorrarProyecto(id);
  updateProjBadge();
  showToast('Proyecto eliminado');
  renderProyectos();
  renderEstado();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');

  if(tab === 'proyectos') renderProyectos();
  if(tab === 'estado')    renderEstado();
  if(tab === 'config')    renderConfig();
  if(tab === 'alarmas')   renderAlarmas();
  if(tab === 'informes')  renderInformes();
}

// ═══════════════════════════════════════════
function renderEstado() {
  const proj = proyectoActivo();
  const ce = document.getElementById('entradas-estado');

  if(!proj) {
    ce.innerHTML = '<div class="empty-state"><strong>Sin proyecto activo</strong>Ve a PROYECTOS y activa uno.</div>';
    document.getElementById('salidas-label').style.display = 'none';
    document.getElementById('salidas-estado').innerHTML = '';
    document.getElementById('updateBar').textContent = '— sin proyecto activo —';
    return;
  }

  const activas = proj.entradas.filter(e => e.activa);
  if(activas.length === 0) {
    ce.innerHTML = '<div class="empty-state">Ninguna entrada activa.<br>Ve a CONFIG para habilitarlas.</div>';
  } else {
    ce.innerHTML = activas.map(e => {
      const cls   = !isOnline ? 'unknown' : (e.valor ? 'high' : 'low');
      const label = !isOnline ? '---' : (e.valor ? 'HIGH' : 'LOW');
      const t     = e.ultimoCambio ? formatTime(e.ultimoCambio) : '—';
      return '<div class="entry-row ' + cls + '">' +
        '<span class="entry-num">IN' + e.id + '</span>' +
        '<span class="entry-name">' + e.nombre + '</span>' +
        '<span class="entry-time">' + (isOnline ? t : '—') + '</span>' +
        '<span class="state-badge ' + cls + '">' + label + '</span>' +
      '</div>';
    }).join('');
  }

  const activasSalidas = proj.salidas.filter(s => s.activa);
  const sl = document.getElementById('salidas-label');
  const ss = document.getElementById('salidas-estado');
  if(activasSalidas.length === 0) {
    sl.style.display = 'none'; ss.innerHTML = '';
  } else {
    sl.style.display = 'block';
    ss.innerHTML = activasSalidas.map(s => {
      const cls = s.valor ? 'high' : 'low';
      return '<div class="entry-row ' + cls + '">' +
        '<span class="entry-num">OUT' + s.id + '</span>' +
        '<span class="entry-name">' + s.nombre + '</span>' +
        '<span class="entry-time">' + (s.modo === 'impulso' ? 'IMPULSO' : 'ASOCIADA') + '</span>' +
        '<span class="state-badge ' + cls + '">' + (s.valor ? 'ON' : 'OFF') + '</span>' +
      '</div>';
    }).join('');
  }
  document.getElementById('updateBar').textContent = isOnline ? 'Actualizado: ' + new Date().toLocaleTimeString('es-ES') : '— sin conexión —';
}

function toggleReportProj(id) {
  const card = document.getElementById('rpcard_' + id);

  document.querySelectorAll('.report-detail').forEach(d => d.classList.remove('visible'));

  if(!isOpen) { detail.classList.add('visible'); card.classList.add('selected'); }
}

function filterMutex(projId, entradaId, val, el) {
  if(el.checked) {
    const otro = val === 'low' ? 'high' : 'low';
    const otroEl = document.querySelector('input[name="filter_' + projId + '_' + entradaId + '"][value="' + otro + '"]');
    if(otroEl) otroEl.checked = false;
  }
}

function confirmarBorrarHistorial(projId, entradaId) {
  const p = proyectos[projId];
  if(!p) return;
  const e = p.entradas[entradaId-1];
  const n = Object.values(p.eventos || {}).filter(ev => ev.id === entradaId).length;
  if(!confirm('¿Borrar historial de IN' + entradaId + ' — ' + e.nombre + ' en "' + p.nombre + '"?\n' + n + ' evento(s) se eliminarán.')) return;
  fbBorrarEventosEntrada(projId, entradaId);
  delete p.eventos;
  p.eventos = {};
  saveLocal();
  showToast('Historial borrado');
  renderInformes();
}

// ═══════════════════════════════════════════
// PDF
// ═══════════════════════════════════════════
function generarPDF(projId) {
  const p = proyectos[projId];
  if(!p) return;
  const desde = document.getElementById('dateFrom_' + projId).value;
  const hasta  = document.getElementById('dateTo_' + projId).value;
  if(!desde || !hasta) { showToast('Selecciona el rango de fechas'); return; }

  const activas = p.entradas.filter(e => e.activa);
  const seleccion = activas.map(e => {
    const chk = document.getElementById('rep_' + projId + '_' + e.id);
    if(!chk || !chk.checked) return null;
    const lowEl  = document.querySelector('input[name="filter_' + projId + '_' + e.id + '"][value="low"]');
    const highEl = document.querySelector('input[name="filter_' + projId + '_' + e.id + '"][value="high"]');
    const filtro = lowEl&&lowEl.checked ? 'low' : (highEl&&highEl.checked ? 'high' : 'ambos');
    return { id:e.id, nombre:e.nombre, filtro };
  }).filter(Boolean);

  if(seleccion.length === 0) { showToast('Selecciona al menos una entrada'); return; }

  const ids = seleccion.map(s => s.id);
  let eventos = Object.values(p.eventos || {}).filter(ev => {
    if(!ids.includes(ev.id)) return false;
    const d = ev.ts.split('T')[0];
    return d >= desde && d <= hasta;
  });
  eventos = eventos.filter(ev => {
    const sel = seleccion.find(s => s.id === ev.id);
    if(!sel) return false;
    if(sel.filtro === 'low')  return !ev.valor;
    if(sel.filtro === 'high') return ev.valor;
    return true;
  }).sort((a,b) => new Date(a.ts) - new Date(b.ts));

  var css = '<style>body{font-family:monospace;font-size:12px;color:#111;padding:20px;}h1{font-size:18px;margin-bottom:4px;}.sub{color:#666;margin-bottom:16px;font-size:11px;}table{width:100%;border-collapse:collapse;}th{background:#222;color:#fff;padding:6px 8px;text-align:left;font-size:11px;}td{padding:5px 8px;border-bottom:1px solid #ddd;font-size:11px;}tr:nth-child(even) td{background:#f5f5f5;}.high{color:#1a7a3a;font-weight:bold;}.low{color:#c0392b;font-weight:bold;}.filtro{font-size:10px;color:#888;}</style>';
  var entHeader = seleccion.map(function(s) {
    var f = s.filtro === 'ambos' ? 'todos los cambios' : s.filtro === 'low' ? 'solo\u2192LOW' : 'solo\u2192HIGH';
    return 'IN' + s.id + '\u00b7' + s.nombre + ' <span class="filtro">[' + f + ']</span>';
  }).join(' | ');
  var rows = eventos.length === 0 ? '<p>Sin eventos en el periodo seleccionado.</p>' :
    '<table><tr><th>FECHA/HORA</th><th>ENTRADA</th><th>NOMBRE</th><th>CAMBIO</th></tr>' +
    eventos.map(function(ev) {
      return '<tr><td>' + formatDateTime(ev.ts) + '</td><td>IN' + ev.id + '</td><td>' + ev.nombre + '</td><td class="' + (ev.valor?'high':'low') + '">' + (ev.valor?'LOW \u2192 HIGH':'HIGH \u2192 LOW') + '</td></tr>';
    }).join('') + '</table>';

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>WATCHALL \u2014 ' + p.nombre + '</title>' + css + '</head><body>' +
    '<h1>\u2b1b WATCHALL \u2014 ' + p.nombre + '</h1>' +
    '<div class="sub">' + entHeader + '<br>Periodo: ' + desde + ' \u2192 ' + hasta + ' | Generado: ' + new Date().toLocaleString('es-ES') + '</div>' +
    rows + '</body></html>';

  var win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  setTimeout(function(){ win.print(); }, 500);
}

// ═══════════════════════════════════════════
// ACCIONES CONFIG
// ═══════════════════════════════════════════
function toggleEntrada(idx, val) {
  const proj = proyectoActivo(); if(!proj) return;
  proj.entradas[idx].activa = val;
  if(!val) proj.entradas[idx].valor = null;
  saveLocal(); fbWriteConfig(); renderEstado();
  showToast('IN' + (idx+1) + ' ' + (val?'habilitada':'deshabilitada'));
}
function setDebounce(idx, val) {
  const proj = proyectoActivo(); if(!proj) return;
  proj.entradas[idx].debounce = Math.min(200, Math.max(0, parseInt(val)||0));
  saveLocal(); fbWriteConfig();
}
function toggleSalidaActiva(idx, val) {
  const proj = proyectoActivo(); if(!proj) return;
  proj.salidas[idx].activa = val;
  saveLocal(); fbWriteConfig(); renderConfig(); renderEstado();
}
function setSalidaModo(idx, modo) {
  const proj = proyectoActivo(); if(!proj) return;
  proj.salidas[idx].modo = modo;
  saveLocal(); fbWriteConfig(); renderConfig();
}
function setSalidaImpulso(idx, val) {
  const proj = proyectoActivo(); if(!proj) return;
  proj.salidas[idx].impulso.intervalo = parseInt(val)||1;
  saveLocal(); fbWriteConfig();
}

// MODAL EDITAR NOMBRE
let editTarget = null;
function openEditModal(idx, tipo) {
  editTarget = {idx, tipo};
  const proj = proyectoActivo(); if(!proj) return;
  const obj = tipo==='entrada' ? proj.entradas[idx] : proj.salidas[idx];
  const prefix = tipo==='entrada' ? 'IN'+obj.id : 'OUT'+obj.id;
  document.getElementById('modalEditTitle').textContent = 'EDITAR ' + prefix;
  document.getElementById('modalNameInput').value = obj.nombre;
  document.getElementById('modalEdit').classList.add('open');
  setTimeout(()=>document.getElementById('modalNameInput').focus(),100);
}
function saveEditName() {
  const val = document.getElementById('modalNameInput').value.trim();
  if(!val) { showToast('El nombre no puede estar vacío'); return; }
  const proj = proyectoActivo(); if(!proj) return;
  if(editTarget.tipo==='entrada') proj.entradas[editTarget.idx].nombre = val;
  else proj.salidas[editTarget.idx].nombre = val;
  saveLocal(); fbWriteConfig(); closeModal('modalEdit'); showToast('Nombre guardado');
  renderConfig(); renderEstado();
}

// MODAL ASOCIADA
let asocTarget = null;
function openAsociadaModal(idx) {
  asocTarget = idx;
  const proj = proyectoActivo(); if(!proj) return;
  const s = proj.salidas[idx];
  const entActivas = proj.entradas.filter(e=>e.activa);
  if(entActivas.length===0) { showToast('Habilita alguna entrada primero'); return; }
  document.getElementById('modalAsociadaTitle').textContent = 'OUT' + s.id + ' — ASOCIADA A ENTRADA';
  const sel = document.getElementById('asocEntrada');
  sel.innerHTML = entActivas.map(e=>'<option value="'+(e.id-1)+'" '+(s.asociada.entrada===e.id-1?'selected':'')+'>IN'+e.id+' — '+e.nombre+'</option>').join('');
  document.getElementById('asocCondicion').value = s.asociada.condicion;
  document.getElementById('asocComportamiento').value = s.asociada.comportamiento;
  document.getElementById('asocTiempo').value = s.asociada.duracion;
  toggleAsocTiempo();
  document.getElementById('modalAsociada').classList.add('open');
}
function toggleAsocTiempo() {
  document.getElementById('asocTiempoWrap').style.display = document.getElementById('asocComportamiento').value==='tiempo' ? 'block' : 'none';
}
function saveAsociada() {
  const proj = proyectoActivo(); if(!proj) return;
  proj.salidas[asocTarget].asociada = {
    entrada: parseInt(document.getElementById('asocEntrada').value),
    condicion: document.getElementById('asocCondicion').value,
    comportamiento: document.getElementById('asocComportamiento').value,
    duracion: parseInt(document.getElementById('asocTiempo').value)||5
  };
  saveLocal(); fbWriteConfig(); closeModal('modalAsociada'); showToast('Salida asociada guardada'); renderConfig();
}

// ALARMAS
function toggleAlarma(idx, val) { const p=proyectoActivo();if(!p)return; p.entradas[idx].alarma.habilitada=val; saveLocal();fbWriteConfig();renderAlarmas(); }
function setAlarmaTipo(idx, tipo) { const p=proyectoActivo();if(!p)return; p.entradas[idx].alarma.tipo=tipo; saveLocal();fbWriteConfig();renderAlarmas(); }
function setAlarmaTiempo(idx, val) { const p=proyectoActivo();if(!p)return; p.entradas[idx].alarma.tiempoMin=parseInt(val)||0; saveLocal();fbWriteConfig(); }
function setAlarmaNotif(idx, val) {
  const p=proyectoActivo();if(!p)return; p.entradas[idx].alarma.notificar=val; saveLocal();fbWriteConfig();
  const wrap=document.getElementById('msgwrap_'+idx); if(wrap) wrap.classList.toggle('visible',val);
}
function setAlarmaMsg(idx, val) { const p=proyectoActivo();if(!p)return; p.entradas[idx].alarma.mensaje=val; saveLocal();fbWriteConfig(); }

// UTILS
function openModalNuevoProyecto() {
  document.getElementById('modalProjNombre').value = '';
  document.getElementById('modalNuevoProyecto').classList.add('open');
  setTimeout(()=>document.getElementById('modalProjNombre').focus(),100);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function updateConnBadge() {
  const b=document.getElementById('connBadge');
  b.textContent=isOnline?'4G ●':'OFFLINE';
  b.className='conn-badge'+(isOnline?' online':'');
}
function updateProjBadge() {
  const b=document.getElementById('projBadge');
  const p=proyectoActivo();
  b.textContent=p?p.nombre:'Sin proyecto activo';
  b.className='proj-badge'+(p?' active':'');
}
function formatDate(iso) { try{return new Date(iso).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return'—';} }
function formatTime(iso) { try{return new Date(iso).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}catch(e){return'—';} }
function formatDateTime(iso) { try{const d=new Date(iso);return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}catch(e){return'—';} }
function showToast(msg) { const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500); }

// INIT
updateProjBadge();
updateConnBadge();
renderProyectos();
if(proyectoActivoId) suscribirEventos(proyectoActivoId);
</script>
